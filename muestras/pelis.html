    async function traerPelis() {
        var link = "";
        if(busqueda == ""){
            link = 'https://api.themoviedb.org/3/movie/'+filtro+'?api_key=406e0fbf5e6e004b7f8c11e7b4ae9674';
        }else{
            link = 'https://api.themoviedb.org/3/search/movie?api_key=406e0fbf5e6e004b7f8c11e7b4ae9674&query='+busqueda+'';
        }
          const response = await fetch(link, 
                {
                    method: 'GET',
                });
          // waits until the request completes...
          const res = await response.json();
          return res;       
    }

    function mostrarPelis(){
        busqueda = document.getElementById("busqueda").value;
        filtro = document.getElementById("sel_filtro").value;

        //Primero limpio todo el DOM, para que no vuelva a cargar encima
        const myNode = document.getElementById("Listado");
        while (myNode.firstChild) {
            myNode.removeChild(myNode.lastChild);
        }


      //Llamo al metodo asincronico "traerPelis"
        traerPelis().then(dato => {
        	console.log(dato.results.length);
        	filaNum = 0;

        	for(i = 0; i < dato.results.length; i++){
        		var fila = document.createElement("div");
        		fila.className = "flex-row";
        		
                //Pongo 4 por fila
        		if (i%4 == 0){
        			filaNum++;
        			fila.id = filaNum;
        			document.getElementById("Listado").appendChild(fila);

        			var grupoTarjetas = document.createElement("div");
        			grupoTarjetas.className = "card-deck";
        			grupoTarjetas.id="grupo"+filaNum;
        			document.getElementById(filaNum).appendChild(grupoTarjetas);

        			var salto = document.createElement("br");
        			document.getElementById("Listado").appendChild(salto);

        			
        		}
                //Muestra la pelicula
        		generaItemPeli(dato.results[i], filaNum);
        	}

        });
    }

    function generaItemPeli(pelicula, filaNum){

    	/*var contorno = document.createElement("div");
    	contorno.className = "col-md-3";
    	contorno.id = "col"+pelicula.id;
    	document.getElementById("grupo"+filaNum).appendChild(contorno);*/

    	//Div prioncipal de la tarjeta
    	var tarjeta = document.createElement("div");
    	tarjeta.className = "card";
    	tarjeta.style.width = "12rem";
    	tarjeta.id = "card"+pelicula.id;
    	document.getElementById("grupo"+filaNum).appendChild(tarjeta);

    	//imagen del poster
    	var poster = document.createElement("img");
        poster.src = "https://image.tmdb.org/t/p/w500/"+pelicula.poster_path;
        poster.className = "card-img-top";
        document.getElementById("card"+pelicula.id).appendChild(poster);

        var cuerpoInfo = document.createElement("div");
    	cuerpoInfo.className = "card-body";
    	cuerpoInfo.id = "cuerpo"+pelicula.id;
    	document.getElementById("card"+pelicula.id).appendChild(cuerpoInfo);

    	//Contenido del cuerpo
    	var titulo = document.createElement("h5");
        titulo.innerHTML = pelicula.title;
        titulo.className = "card-title";
        document.getElementById("cuerpo"+pelicula.id).appendChild(titulo);

        var fecha = document.createElement("p");
        fecha.innerHTML = "Fecha de estreno "+pelicula.release_date;
        fecha.className = "card-text";
        document.getElementById("cuerpo"+pelicula.id).appendChild(fecha);

        //Pie de la tarjeta
        var pie = document.createElement("div");
        pie.className = "card-footer";
        pie.id="pie"+pelicula.id;
        document.getElementById("card"+pelicula.id).appendChild(pie);

        var textoPie = document.createElement("small");
        textoPie.innerHTML = "Votacion: "+pelicula.vote_average;
        textoPie.className = "text-muted";
        document.getElementById("pie"+pelicula.id).appendChild(textoPie);
    }

    function limpiarBusqueda(){
        document.getElementById("busqueda").value = "";
    }


</script>


<body onload="mostrarPelis()">	

    <nav class="navbar navbar-dark bg-dark navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">Peliculas</a>
            </div>

        <div>
           <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Ingrese titulo" aria-label="Ingrese titulo" aria-describedby="basic-addon2" id="busqueda">
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button" onclick="mostrarPelis(), limpiarBusqueda()">Buscar</button>
                </div>
            </div>
        </div>

        <div>
            <select id=sel_filtro onchange="mostrarPelis()" class="custom-select">
                <option value="upcoming">A estrenar</option>
                <option value="top_rated">Mejor rankeadas</option>
            </select>
        </div>
        </div>
    </nav>

<div class="container"> 
    

  	<center>
  		<div id="Listado">

	</div><!--Fin listado-->
	</center>
</div>
